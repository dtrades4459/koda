name: broker-sync

# DORMANT — Tradovate API credentials are not currently provisioned, so this
# workflow has been disabled until they are. When credentials land, uncomment
# the `schedule:` block below to re-enable the 5-minute sync. workflow_dispatch
# is preserved so the endpoint can still be smoke-tested manually from the
# Actions tab.
#
# Required GitHub secret (when re-enabled):
#   CRON_SECRET — same value as the CRON_SECRET env var in Vercel

on:
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Trigger broker sync
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://kodatrade.co.uk/api/cron/sync" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 180)
          echo "Response status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Sync endpoint returned $STATUS — failing the job"
            exit 1
          fi
