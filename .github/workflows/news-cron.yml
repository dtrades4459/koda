name: news-cron

# Schedule: every 15 minutes — refreshes BOTH the headlines and calendar caches.
#
# Why both: FF publishes economic event "actual" results throughout the trading
# day (CPI at 13:30 UTC, retail sales at 13:30 UTC, etc.). The Vercel daily cron
# in vercel.json at 11:00 UTC misses every release after that. Refreshing the
# calendar alongside headlines on every fire picks up the actuals as soon as
# they're published.
#
# Why */15 instead of */30: GitHub Actions scheduled workflows on the free tier
# are documented as "best effort" and routinely lag 2-5 hours under cluster load.
# Doubling the attempt frequency absorbs some of that lag so we land closer to
# the intended cadence.
#
# Required GitHub secret:
#   CRON_SECRET — same value as the CRON_SECRET env var in Vercel

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger news-calendar refresh
        run: |
          RESP=$(curl -s -w "\n__STATUS__:%{http_code}" \
            -X GET "https://www.kodatrade.co.uk/api/cron?job=news-calendar" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 60)
          STATUS="${RESP##*__STATUS__:}"
          BODY="${RESP%__STATUS__:*}"
          echo "news-calendar status: $STATUS"
          echo "news-calendar body: $BODY"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "news-calendar returned $STATUS — failing the job"
            exit 1
          fi

      - name: Trigger news-headlines refresh
        run: |
          RESP=$(curl -s -w "\n__STATUS__:%{http_code}" \
            -X GET "https://www.kodatrade.co.uk/api/cron?job=news-headlines" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 60)
          STATUS="${RESP##*__STATUS__:}"
          BODY="${RESP%__STATUS__:*}"
          echo "news-headlines status: $STATUS"
          echo "news-headlines body: $BODY"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "news-headlines returned $STATUS — failing the job"
            exit 1
          fi
