  <text x="260" y="305" font-family="'Geist Mono', monospace" font-size="20" font-weight="500" letter-spacing="2" fill="oklch(0.84 0.14 175)">@{{HANDLE}}</text>
  <!-- Stats row -->
  <g transform="translate(96, 400)" font-family="Geist, sans-serif" fill="#F2F2EE">
    <text x="0" y="0" font-size="14" letter-spacing="2" fill="#65655F">NET</text>
    <text x="0" y="38" font-size="40" font-weight="600" letter-spacing="-1.5">{{NET_R}}</text>
    <text x="280" y="0" font-size="14" letter-spacing="2" fill="#65655F">WIN RATE</text>
    <text x="280" y="38" font-size="40" font-weight="600" letter-spacing="-1.5">{{WIN_RATE}}</text>
    <text x="560" y="0" font-size="14" letter-spacing="2" fill="#65655F">DISCIPLINE</text>
    <text x="560" y="38" font-size="40" font-weight="600" letter-spacing="-1.5" fill="oklch(0.84 0.14 175)">{{DISCIPLINE}}</text>
  </g>
  <text x="96" y="540" font-family="'Geist Mono', monospace" font-size="14" font-weight="500" letter-spacing="4" fill="#65655F">KODATRADE.CO.UK</text>
